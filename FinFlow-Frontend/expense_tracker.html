<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FinFlow</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <!-- Top Bar / Navbar -->
        <div class="top-bar">
            <h1>
                <i data-lucide="wallet" style="width: 28px; height: 28px; color: var(--primary-color);"></i>
                FinFlow
            </h1>
            <div class="user-profile">
                <div class="welcome-user">
                    Hello, <span id="userName">User</span>
                </div>
                <div class="settings-dropdown-container">
                    <button class="settings-button" id="settingsBtn" title="Options">
                        <i data-lucide="more-vertical" style="width: 18px; height: 18px;"></i>
                    </button>
                    <div class="dropdown-menu" id="settingsDropdown">
                        <button class="dropdown-item" id="openTrashBtn">
                            <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                            Trash Bin
                        </button>
                        <button class="dropdown-item logout" id="logoutBtn">
                            <i data-lucide="log-out" style="width: 14px; height: 14px; color: var(--danger-color);"></i>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI Summary Cards -->
        <div class="kpi-container">
            <div class="card kpi-card balance-card">
                <div class="kpi-header">
                    <span>Total Balance</span>
                    <div class="kpi-icon-container">
                        <i data-lucide="scale" style="width: 18px; height: 18px;"></i>
                    </div>
                </div>
                <p class="kpi-value" id="balance">₹0.00</p>
            </div>
            
            <div class="card kpi-card income-card">
                <div class="kpi-header">
                    <span>Income</span>
                    <div class="kpi-icon-container">
                        <i data-lucide="arrow-up-right" style="width: 18px; height: 18px;"></i>
                    </div>
                </div>
                <p class="kpi-value" id="income">₹0.00</p>
            </div>
            
            <div class="card kpi-card expense-card">
                <div class="kpi-header">
                    <span>Expenses</span>
                    <div class="kpi-icon-container">
                        <i data-lucide="arrow-down-left" style="width: 18px; height: 18px;"></i>
                    </div>
                </div>
                <p class="kpi-value" id="expense">₹0.00</p>
            </div>
        </div>

        <!-- Main Dashboard Content Grid -->
        <div class="dashboard-grid">
            <!-- Left Column: Add Transaction & Chart -->
            <div class="dashboard-sidebar">
                <div class="card">
                    <div class="card-title">
                        <i data-lucide="plus-circle" style="width: 20px; height: 20px; color: var(--primary-color);"></i>
                        Add Transaction
                    </div>
                    
                    <!-- Transaction Type Tabs -->
                    <div class="transaction-type-tabs" id="typeTabs">
                        <button type="button" class="tab-btn active" data-type="expense" id="tabExpense">
                            <i data-lucide="arrow-down-left" style="width: 16px; height: 16px;"></i>
                            Expense
                        </button>
                        <button type="button" class="tab-btn" data-type="income" id="tabIncome">
                            <i data-lucide="arrow-up-right" style="width: 16px; height: 16px;"></i>
                            Income
                        </button>
                    </div>

                    <div class="form">
                        <div class="form-control">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="Enter description...">
                        </div>
                        <div class="form-control">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" placeholder="Enter amount..." min="0.01" step="0.01">
                        </div>
                        <button class="btn" id="add-transaction">
                            <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
                            Add Transaction
                        </button>
                    </div>
                </div>

            </div>

            <!-- Right Column: History -->
            <div class="dashboard-main">
                <div class="card">
                    <div class="card-title">
                        <i data-lucide="history" style="width: 20px; height: 20px; color: var(--primary-color);"></i>
                        Transaction History
                    </div>

                    <!-- Search and Filter Controls -->
                    <div class="history-controls">
                        <div class="search-container">
                            <i data-lucide="search"></i>
                            <input type="text" id="searchInput" placeholder="Search transactions...">
                        </div>

                    </div>

                    <!-- Scrollable Transaction List -->
                    <div class="transaction-list" id="list">
                        <!-- Items dynamically generated by script.js -->
                    </div>
                    
                    <!-- Show All container -->
                    <div id="showAllContainer" style="display: none; text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                        <button class="filter-btn" id="showAllBtn" style="width: 100%; justify-content: center; padding: 10px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; color: var(--primary-color); border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.01);">
                            <span>Show All Transactions</span>
                            <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                        </button>
                    </div>
                </div>
        </div>

    </div>

    <!-- Footer Section -->
    <footer class="landing-footer" style="--footer-max-width: 1100px;">
        <div class="footer-container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; 2026 FinFlow Expense Tracker. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Trash Modal -->
    <div class="modal" id="trashModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>
                    <i data-lucide="trash-2" style="color: var(--danger-color); width: 22px; height: 22px; display: inline-block; vertical-align: middle; margin-right: 6px;"></i>Trash Bin
                </h2>
                <button class="close-modal-btn" id="closeTrashModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-container modal-search">
                    <i data-lucide="search"></i>
                    <input type="text" id="modalSearchInput" placeholder="Search deleted transactions...">
                </div>
                <div class="transaction-list modal-list" id="modalList">
                    <!-- Deleted items dynamically generated here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2>
                    <i data-lucide="edit-3" style="color: var(--primary-color); width: 22px; height: 22px; display: inline-block; vertical-align: middle; margin-right: 6px;"></i>Edit Transaction
                </h2>
                <button class="close-modal-btn" id="closeEditModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form" id="edit-form">
                    <!-- Transaction Type Tabs in modal -->
                    <div class="transaction-type-tabs" id="editTypeTabs">
                        <button type="button" class="tab-btn active" data-type="expense" id="editTabExpense">
                            <i data-lucide="arrow-down-left" style="width: 16px; height: 16px;"></i>
                            Expense
                        </button>
                        <button type="button" class="tab-btn" data-type="income" id="editTabIncome">
                            <i data-lucide="arrow-up-right" style="width: 16px; height: 16px;"></i>
                            Income
                        </button>
                    </div>
                    <div class="form-control">
                        <label for="editText">Description</label>
                        <input type="text" id="editText" placeholder="Enter description...">
                    </div>
                    <div class="form-control">
                        <label for="editAmount">Amount</label>
                        <input type="number" id="editAmount" placeholder="Enter amount..." min="0.01" step="0.01">
                    </div>
                    <div class="form-control">
                        <label for="editDate">Date</label>
                        <input type="date" id="editDate" required>
                    </div>
                    <button class="btn" id="save-edit-btn">
                        <i data-lucide="check" style="width: 18px; height: 18px;"></i>
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>



    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="session.js"></script>
    <script src="script.js"></script>
</body>

</html>
